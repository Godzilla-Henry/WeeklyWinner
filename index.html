<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Weekly Winner</title>
    <style>
      /* ── Splash Screen（Vue mount 前顯示） ── */
      :root {
        --splash-brand: #E8920A;
        --splash-bg: #FAFAF8;
        --splash-text: #1A1A1A;
        --splash-muted: #9CA3AF;
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        background: var(--splash-bg);
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      #splash.hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* Logo 動畫 */
      .splash-logo {
        width: 80px;
        height: 80px;
        animation: splash-breathe 2s ease-in-out infinite;
      }

      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.85; }
      }

      /* 載入指示器 */
      .splash-loader {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--splash-brand);
        animation: splash-bounce 1.4s ease-in-out infinite;
      }

      .splash-dot:nth-child(2) { animation-delay: 0.16s; }
      .splash-dot:nth-child(3) { animation-delay: 0.32s; }

      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* 提示文字 */
      .splash-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: var(--splash-muted);
        letter-spacing: 0.02em;
        animation: splash-fade 2.5s ease-in-out infinite;
      }

      @keyframes splash-fade {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen — Vue mount 後由 App.vue 移除 -->
    <div id="splash">
      <svg class="splash-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15 L28 80 L44 40 L60 80 L76 15" fill="none" stroke="#1A1A1A" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M32 15 L48 80 L64 40 L80 80 L96 15" fill="none" stroke="#E8920A" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      <div class="splash-loader">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
      <p class="splash-text">正在準備中，請稍候…</p>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      /* 三階段漸進提示，讓等待過程有節奏感 */
      var phrases = [
        { time: 4000, text: '正在連線伺服器…' },
        { time: 10000, text: '伺服器喚醒中，首次載入約需 20 秒' },
        { time: 20000, text: '快好了，感謝您的耐心等候 ✨' },
      ];
      phrases.forEach(function(p) {
        setTimeout(function() {
          var el = document.querySelector('.splash-text');
          if (el) {
            el.style.opacity = '0';
            setTimeout(function() {
              el.textContent = p.text;
              el.style.opacity = '';
            }, 300);
          }
        }, p.time);
      });
    </script>
  </body>
</html>
